<svg viewBox="0 0 300 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body-o3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E5E2DB"/>
      <stop offset="35%" stop-color="#F0EDE6"/>
      <stop offset="100%" stop-color="#E2DFD8"/>
    </linearGradient>
    <linearGradient id="cap-o3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D6D2CB"/>
      <stop offset="100%" stop-color="#C5C1BA"/>
    </linearGradient>
    <linearGradient id="ring-o3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A84B"/>
      <stop offset="100%" stop-color="#B0844A"/>
    </linearGradient>
    <clipPath id="cap-clip-o3">
      <rect x="52" y="15" width="196" height="90" rx="22"/>
    </clipPath>
    <clipPath id="body-clip-o3">
      <rect x="45" y="112" width="210" height="340" rx="14"/>
    </clipPath>
  </defs>

  <!-- BOTTLE BODY -->
  <rect x="45" y="112" width="210" height="340" rx="14" fill="url(#body-o3)"/>

  <!-- NAVY BOTTOM -->
  <rect x="45" y="380" width="210" height="72" rx="0" fill="#131929"/>
  <rect x="45" y="430" width="210" height="22" rx="0 0 14 14" fill="#131929"/>
  <path d="M45,430 L255,430 L255,452 Q255,452 255,452 L255,452 Q255,466 241,466 L59,466 Q45,466 45,452 Z" fill="#131929"/>

  <!-- CAP -->
  <rect x="52" y="15" width="196" height="90" rx="22" fill="url(#cap-o3)"/>
  <!-- Speckles -->
  <g clip-path="url(#cap-clip-o3)" opacity="0.45">
    <circle cx="72" cy="30" r="2.2" fill="#3A3730"/>
    <circle cx="145" cy="22" r="1.6" fill="#3A3730"/>
    <circle cx="205" cy="38" r="2.4" fill="#3A3730"/>
    <circle cx="88" cy="62" r="1.8" fill="#3A3730"/>
    <circle cx="168" cy="68" r="2.1" fill="#3A3730"/>
    <circle cx="220" cy="52" r="1.6" fill="#3A3730"/>
    <circle cx="118" cy="82" r="2.3" fill="#3A3730"/>
    <circle cx="65" cy="90" r="1.7" fill="#3A3730"/>
    <circle cx="238" cy="75" r="2" fill="#3A3730"/>
    <circle cx="185" cy="92" r="1.5" fill="#3A3730"/>
    <circle cx="102" cy="45" r="2" fill="#3A3730"/>
    <circle cx="158" cy="50" r="1.9" fill="#3A3730"/>
    <circle cx="228" cy="28" r="2.3" fill="#3A3730"/>
    <circle cx="62" cy="50" r="1.5" fill="#3A3730"/>
    <circle cx="132" cy="38" r="1.8" fill="#3A3730"/>
    <circle cx="192" cy="25" r="2" fill="#3A3730"/>
    <circle cx="78" cy="78" r="2.1" fill="#3A3730"/>
    <circle cx="245" cy="58" r="1.7" fill="#3A3730"/>
  </g>

  <!-- GOLD RING -->
  <rect x="45" y="103" width="210" height="11" rx="3" fill="url(#ring-o3)"/>

  <!-- LABEL CONTENT -->
  <!-- NUCLORA wordmark -->
  <text x="68" y="143" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="400" letter-spacing="5" fill="#131929">NUCLORA</text>
  <!-- Tagline -->
  <text x="68" y="158" font-family="Arial, Helvetica, sans-serif" font-size="6.5" font-weight="400" letter-spacing="3" fill="#2D7A9A">CELLULAR LONGEVITY</text>

  <!-- Product name -->
  <text x="68" y="198" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="400" fill="#131929">OMEGA-3</text>
  <text x="68" y="228" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="400" fill="#131929">ULTRA</text>

  <!-- Dosage -->
  <text x="68" y="250" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="300" fill="#2A2520">3000 mg EPA+DHA</text>
  <text x="68" y="264" font-family="Arial, Helvetica, sans-serif" font-size="7.5" font-weight="300" fill="#7A756E">Triglyceride Form</text>

  <!-- Gold separator line -->
  <line x1="68" y1="276" x2="128" y2="276" stroke="#B8906A" stroke-width="1.5"/>

  <!-- Benefits -->
  <text x="68" y="294" font-family="Arial, Helvetica, sans-serif" font-size="6.8" letter-spacing="0.8" fill="#2A2520">CARDIOVASCULAR SUPPORT*</text>
  <text x="68" y="308" font-family="Arial, Helvetica, sans-serif" font-size="6.8" letter-spacing="0.8" fill="#2A2520">BRAIN HEALTH* · INFLAMMATION*</text>

  <!-- Bottle info -->
  <text x="68" y="368" font-family="Arial, Helvetica, sans-serif" font-size="6.5" letter-spacing="1" fill="#2A2520">DIETARY SUPPLEMENT</text>
  <text x="68" y="380" font-family="Arial, Helvetica, sans-serif" font-size="6.5" letter-spacing="1" fill="#2A2520">60 SOFTGELS</text>

  <!-- N monogram bottom -->
  <text x="150" y="452" font-family="Georgia, serif" font-size="13" fill="#B8906A" opacity="0.5" text-anchor="middle" letter-spacing="1">N</text>

  <!-- MOLECULAR GRAPHIC — Omega fatty acid chain (right side) -->
  <g transform="translate(162, 168)" opacity="0.18">
    <!-- Undulating wave chain -->
    <path d="M0,65 Q12,20 24,65 Q36,110 48,65 Q60,20 72,65 Q84,110 96,65" fill="none" stroke="#131929" stroke-width="1.4"/>
    <!-- Atom spheres on chain -->
    <circle cx="0" cy="65" r="5" fill="#2D7A9A" opacity="0.8"/>
    <circle cx="24" cy="65" r="7" fill="#2D7A9A" opacity="0.8"/>
    <circle cx="48" cy="65" r="6" fill="#2D7A9A" opacity="0.8"/>
    <circle cx="72" cy="65" r="7" fill="#2D7A9A" opacity="0.8"/>
    <circle cx="96" cy="65" r="5" fill="#2D7A9A" opacity="0.8"/>
    <!-- Branch bonds -->
    <line x1="24" y1="65" x2="24" y2="40" stroke="#131929" stroke-width="1"/>
    <circle cx="24" cy="35" r="4" fill="#2D7A9A" opacity="0.6"/>
    <line x1="72" y1="65" x2="72" y2="40" stroke="#131929" stroke-width="1"/>
    <circle cx="72" cy="35" r="4" fill="#2D7A9A" opacity="0.6"/>
    <!-- Lower chain -->
    <path d="M0,120 Q18,90 36,120 Q54,150 72,120 Q90,90 96,120" fill="none" stroke="#131929" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="120" r="3.5" fill="#2D7A9A" opacity="0.5"/>
    <circle cx="36" cy="120" r="4.5" fill="#2D7A9A" opacity="0.5"/>
    <circle cx="72" cy="120" r="3.5" fill="#2D7A9A" opacity="0.5"/>
  </g>
</svg>
