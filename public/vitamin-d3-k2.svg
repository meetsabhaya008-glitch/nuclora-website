  <text x="68" y="158" font-family="Arial, Helvetica, sans-serif" font-size="6.5" font-weight="400" letter-spacing="3" fill="#B8906A">CELLULAR LONGEVITY</text>

  <text x="68" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="400" fill="#131929">VITAMIN</text>
  <text x="68" y="226" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="400" fill="#131929">D3 + K2</text>

  <text x="68" y="249" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="300" fill="#2A2520">5000 IU + 200 mcg MK-7</text>
  <text x="68" y="263" font-family="Arial, Helvetica, sans-serif" font-size="7.5" font-weight="300" fill="#7A756E">Cholecalciferol + Menaquinone</text>

