    <circle cx="0" cy="-72" r="3" fill="#C4973B" opacity="0.4"/>
    <circle cx="62" cy="-36" r="3" fill="#C4973B" opacity="0.4"/>
    <circle cx="62" cy="36" r="3" fill="#C4973B" opacity="0.4"/>
    <circle cx="0" cy="72" r="3" fill="#C4973B" opacity="0.4"/>
    <circle cx="-62" cy="36" r="3" fill="#C4973B" opacity="0.4"/>
    <circle cx="-62" cy="-36" r="3" fill="#C4973B" opacity="0.4"/>
