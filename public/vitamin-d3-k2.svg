<svg viewBox="0 0 300 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body-dk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E5E2DB"/>
      <stop offset="35%" stop-color="#F0EDE6"/>
      <stop offset="100%" stop-color="#E2DFD8"/>
    </linearGradient>
    <linearGradient id="cap-dk" x1="0" y1="0" x2="0" y2="1">
