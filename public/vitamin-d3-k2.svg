    <circle cx="0" cy="-60" r="5.5" fill="#C4973B" opacity="0.7"/>
    <line x1="19" y1="-11" x2="47" y2="-27" stroke="#131929" stroke-width="1.3"/>
    <circle cx="51" cy="-29" r="5" fill="#C4973B" opacity="0.7"/>
