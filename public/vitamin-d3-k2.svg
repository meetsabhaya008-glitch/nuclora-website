  <text x="68" y="380" font-family="Arial, Helvetica, sans-serif" font-size="6.5" letter-spacing="1" fill="#2A2520">60 VEGGIE CAPSULES</text>

  <text x="150" y="452" font-family="Georgia, serif" font-size="13" fill="#B8906A" opacity="0.5" text-anchor="middle" letter-spacing="1">N</text>

