<svg viewBox="0 0 300 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body-cc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E5E2DB"/>
      <stop offset="35%" stop-color="#F0EDE6"/>
      <stop offset="100%" stop-color="#E2DFD8"/>
    </linearGradient>
    <linearGradient id="cap-cc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D6D2CB"/>
      <stop offset="100%" stop-color="#C5C1BA"/>
    </linearGradient>
    <linearGradient id="ring-cc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A84B"/>
      <stop offset="100%" stop-color="#B0844A"/>
    </linearGradient>
    <clipPath id="cap-clip-cc">
      <rect x="52" y="15" width="196" height="90" rx="22"/>
    </clipPath>
  </defs>

  <!-- BOTTLE BODY -->
  <rect x="45" y="112" width="210" height="340" rx="14" fill="url(#body-cc)"/>

  <!-- NAVY BOTTOM -->
  <path d="M45,380 L255,380 L255,452 Q255,466 241,466 L59,466 Q45,466 45,452 Z" fill="#131929"/>

  <!-- CAP -->
  <rect x="52" y="15" width="196" height="90" rx="22" fill="url(#cap-cc)"/>
  <g clip-path="url(#cap-clip-cc)" opacity="0.45">
    <circle cx="72" cy="30" r="2.2" fill="#3A3730"/>
    <circle cx="145" cy="22" r="1.6" fill="#3A3730"/>
    <circle cx="205" cy="38" r="2.4" fill="#3A3730"/>
    <circle cx="88" cy="62" r="1.8" fill="#3A3730"/>
    <circle cx="168" cy="68" r="2.1" fill="#3A3730"/>
    <circle cx="220" cy="52" r="1.6" fill="#3A3730"/>
    <circle cx="118" cy="82" r="2.3" fill="#3A3730"/>
    <circle cx="65" cy="90" r="1.7" fill="#3A3730"/>
    <circle cx="238" cy="75" r="2" fill="#3A3730"/>
    <circle cx="185" cy="92" r="1.5" fill="#3A3730"/>
    <circle cx="102" cy="45" r="2" fill="#3A3730"/>
    <circle cx="158" cy="50" r="1.9" fill="#3A3730"/>
    <circle cx="228" cy="28" r="2.3" fill="#3A3730"/>
    <circle cx="62" cy="50" r="1.5" fill="#3A3730"/>
    <circle cx="132" cy="38" r="1.8" fill="#3A3730"/>
    <circle cx="192" cy="25" r="2" fill="#3A3730"/>
    <circle cx="78" cy="78" r="2.1" fill="#3A3730"/>
    <circle cx="245" cy="58" r="1.7" fill="#3A3730"/>
  </g>

  <!-- GOLD RING -->
  <rect x="45" y="103" width="210" height="11" rx="3" fill="url(#ring-cc)"/>

  <!-- LABEL CONTENT -->
  <text x="68" y="143" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="400" letter-spacing="5" fill="#131929">NUCLORA</text>
  <text x="68" y="158" font-family="Arial, Helvetica, sans-serif" font-size="6.5" font-weight="400" letter-spacing="3" fill="#2A6A8A">CELLULAR LONGEVITY</text>

  <text x="68" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="23" font-weight="400" fill="#131929">COGNITIVE</text>
  <text x="68" y="222" font-family="Georgia, 'Times New Roman', serif" font-size="23" font-weight="400" fill="#131929">CLARITY</text>

  <text x="68" y="246" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="300" fill="#2A2520">Lion's Mane + Bacopa</text>
  <text x="68" y="260" font-family="Arial, Helvetica, sans-serif" font-size="7.5" font-weight="300" fill="#7A756E">With Phosphatidylserine</text>

  <line x1="68" y1="272" x2="128" y2="272" stroke="#B8906A" stroke-width="1.5"/>

  <text x="68" y="290" font-family="Arial, Helvetica, sans-serif" font-size="6.8" letter-spacing="0.8" fill="#2A2520">FOCUS &amp; MEMORY*</text>
  <text x="68" y="304" font-family="Arial, Helvetica, sans-serif" font-size="6.8" letter-spacing="0.8" fill="#2A2520">NEUROPLASTICITY* · CLARITY*</text>

  <text x="68" y="368" font-family="Arial, Helvetica, sans-serif" font-size="6.5" letter-spacing="1" fill="#2A2520">DIETARY SUPPLEMENT</text>
  <text x="68" y="380" font-family="Arial, Helvetica, sans-serif" font-size="6.5" letter-spacing="1" fill="#2A2520">60 VEGGIE CAPSULES</text>

  <text x="150" y="452" font-family="Georgia, serif" font-size="13" fill="#B8906A" opacity="0.5" text-anchor="middle" letter-spacing="1">N</text>

  <!-- MOLECULAR GRAPHIC — Neural branching dendrites -->
  <g transform="translate(205, 255)" opacity="0.16">
    <!-- Central node -->
    <circle cx="0" cy="0" r="9" fill="#2A6A8A" opacity="0.8"/>
    <!-- Main branches -->
    <line x1="0" y1="0" x2="-40" y2="-45" stroke="#131929" stroke-width="1.3"/>
    <circle cx="-40" cy="-45" r="6" fill="#2A6A8A" opacity="0.7"/>
    <line x1="0" y1="0" x2="42" y2="-38" stroke="#131929" stroke-width="1.3"/>
    <circle cx="42" cy="-38" r="5.5" fill="#2A6A8A" opacity="0.7"/>
    <line x1="0" y1="0" x2="50" y2="20" stroke="#131929" stroke-width="1.3"/>
    <circle cx="50" cy="20" r="5" fill="#2A6A8A" opacity="0.7"/>
    <line x1="0" y1="0" x2="-8" y2="55" stroke="#131929" stroke-width="1.3"/>
    <circle cx="-8" cy="55" r="6" fill="#2A6A8A" opacity="0.7"/>
    <line x1="0" y1="0" x2="-50" y2="18" stroke="#131929" stroke-width="1.3"/>
    <circle cx="-50" cy="18" r="5" fill="#2A6A8A" opacity="0.7"/>
    <!-- Sub-branches from top-left -->
    <line x1="-40" y1="-45" x2="-62" y2="-72" stroke="#131929" stroke-width="0.9"/>
    <circle cx="-62" cy="-72" r="4" fill="#2A6A8A" opacity="0.55"/>
    <line x1="-40" y1="-45" x2="-16" y2="-68" stroke="#131929" stroke-width="0.9"/>
    <circle cx="-16" cy="-68" r="3.5" fill="#2A6A8A" opacity="0.5"/>
    <!-- Sub-branches from top-right -->
    <line x1="42" y1="-38" x2="64" y2="-60" stroke="#131929" stroke-width="0.9"/>
    <circle cx="64" cy="-60" r="3.5" fill="#2A6A8A" opacity="0.55"/>
    <line x1="42" y1="-38" x2="62" y2="-14" stroke="#131929" stroke-width="0.9"/>
    <circle cx="62" cy="-14" r="3" fill="#2A6A8A" opacity="0.5"/>
    <!-- Sub-branches from bottom -->
    <line x1="-8" y1="55" x2="-30" y2="76" stroke="#131929" stroke-width="0.9"/>
    <circle cx="-30" cy="76" r="3.5" fill="#2A6A8A" opacity="0.5"/>
    <line x1="-8" y1="55" x2="18" y2="74" stroke="#131929" stroke-width="0.9"/>
    <circle cx="18" cy="74" r="3" fill="#2A6A8A" opacity="0.5"/>
    <!-- Tiny terminal dots -->
    <circle cx="-72" cy="-58" r="2.5" fill="#2A6A8A" opacity="0.4"/>
    <line x1="-62" y1="-72" x2="-72" y2="-58" stroke="#131929" stroke-width="0.7"/>
    <circle cx="72" cy="-48" r="2.5" fill="#2A6A8A" opacity="0.4"/>
    <line x1="64" y1="-60" x2="72" y2="-48" stroke="#131929" stroke-width="0.7"/>
  </g>
</svg>
