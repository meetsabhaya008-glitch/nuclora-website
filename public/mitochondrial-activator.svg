<svg viewBox="0 0 300 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body-ma" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E5E2DB"/>
      <stop offset="35%" stop-color="#F0EDE6"/>
      <stop offset="100%" stop-color="#E2DFD8"/>
    </linearGradient>
    <linearGradient id="cap-ma" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D6D2CB"/>
      <stop offset="100%" stop-color="#C5C1BA"/>
    </linearGradient>
    <linearGradient id="ring-ma" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A84B"/>
      <stop offset="100%" stop-color="#B0844A"/>
    </linearGradient>
    <clipPath id="cap-clip-ma">
      <rect x="52" y="15" width="196" height="90" rx="22"/>
    </clipPath>
  </defs>

  <!-- BOTTLE BODY -->
  <rect x="45" y="112" width="210" height="340" rx="14" fill="url(#body-ma)"/>

  <!-- NAVY BOTTOM -->
  <path d="M45,380 L255,380 L255,452 Q255,466 241,466 L59,466 Q45,466 45,452 Z" fill="#131929"/>

  <!-- CAP -->
  <rect x="52" y="15" width="196" height="90" rx="22" fill="url(#cap-ma)"/>
  <g clip-path="url(#cap-clip-ma)" opacity="0.45">
    <circle cx="72" cy="30" r="2.2" fill="#3A3730"/>
    <circle cx="145" cy="22" r="1.6" fill="#3A3730"/>
    <circle cx="205" cy="38" r="2.4" fill="#3A3730"/>
    <circle cx="88" cy="62" r="1.8" fill="#3A3730"/>
    <circle cx="168" cy="68" r="2.1" fill="#3A3730"/>
    <circle cx="220" cy="52" r="1.6" fill="#3A3730"/>
    <circle cx="118" cy="82" r="2.3" fill="#3A3730"/>
    <circle cx="65" cy="90" r="1.7" fill="#3A3730"/>
    <circle cx="238" cy="75" r="2" fill="#3A3730"/>
    <circle cx="185" cy="92" r="1.5" fill="#3A3730"/>
    <circle cx="102" cy="45" r="2" fill="#3A3730"/>
    <circle cx="158" cy="50" r="1.9" fill="#3A3730"/>
    <circle cx="228" cy="28" r="2.3" fill="#3A3730"/>
    <circle cx="62" cy="50" r="1.5" fill="#3A3730"/>
    <circle cx="132" cy="38" r="1.8" fill="#3A3730"/>
    <circle cx="192" cy="25" r="2" fill="#3A3730"/>
    <circle cx="78" cy="78" r="2.1" fill="#3A3730"/>
    <circle cx="245" cy="58" r="1.7" fill="#3A3730"/>
  </g>

  <!-- GOLD RING -->
  <rect x="45" y="103" width="210" height="11" rx="3" fill="url(#ring-ma)"/>

  <!-- LABEL CONTENT -->
  <text x="68" y="143" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="400" letter-spacing="5" fill="#131929">NUCLORA</text>
  <text x="68" y="158" font-family="Arial, Helvetica, sans-serif" font-size="6.5" font-weight="400" letter-spacing="3" fill="#C4693A">CELLULAR LONGEVITY</text>

  <!-- Product name — two lines for long name -->
  <text x="68" y="195" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" fill="#131929">MITOCHONDRIAL</text>
  <text x="68" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="400" fill="#131929">ACTIVATOR</text>

  <!-- Dosage -->
  <text x="68" y="244" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="300" fill="#2A2520">CoQ10 + PQQ Complex</text>
  <text x="68" y="258" font-family="Arial, Helvetica, sans-serif" font-size="7.5" font-weight="300" fill="#7A756E">With L-Carnitine + ALA</text>

  <!-- Gold separator line -->
  <line x1="68" y1="270" x2="128" y2="270" stroke="#B8906A" stroke-width="1.5"/>

  <!-- Benefits -->
  <text x="68" y="288" font-family="Arial, Helvetica, sans-serif" font-size="6.8" letter-spacing="0.8" fill="#2A2520">CELLULAR ENERGY*</text>
  <text x="68" y="302" font-family="Arial, Helvetica, sans-serif" font-size="6.8" letter-spacing="0.8" fill="#2A2520">ENDURANCE* · RECOVERY*</text>

  <!-- Bottle info -->
  <text x="68" y="368" font-family="Arial, Helvetica, sans-serif" font-size="6.5" letter-spacing="1" fill="#2A2520">DIETARY SUPPLEMENT</text>
  <text x="68" y="380" font-family="Arial, Helvetica, sans-serif" font-size="6.5" letter-spacing="1" fill="#2A2520">60 VEGGIE CAPSULES</text>

  <!-- N monogram bottom -->
  <text x="150" y="452" font-family="Georgia, serif" font-size="13" fill="#B8906A" opacity="0.5" text-anchor="middle" letter-spacing="1">N</text>

  <!-- MOLECULAR GRAPHIC — Mitochondrial radial energy burst -->
  <g transform="translate(210, 255)" opacity="0.16">
    <!-- Central nucleus -->
    <circle cx="0" cy="0" r="16" fill="#C4693A" opacity="0.6"/>
    <circle cx="0" cy="0" r="10" fill="#C4693A" opacity="0.8"/>
    <!-- Radiating arms -->
    <line x1="0" y1="-16" x2="0" y2="-55" stroke="#131929" stroke-width="1.4"/>
    <circle cx="0" cy="-58" r="5.5" fill="#C4693A" opacity="0.7"/>
    <line x1="14" y1="-7" x2="46" y2="-24" stroke="#131929" stroke-width="1.4"/>
    <circle cx="49" cy="-26" r="5" fill="#C4693A" opacity="0.7"/>
    <line x1="14" y1="7" x2="46" y2="24" stroke="#131929" stroke-width="1.4"/>
    <circle cx="49" cy="26" r="5" fill="#C4693A" opacity="0.7"/>
    <line x1="0" y1="16" x2="0" y2="55" stroke="#131929" stroke-width="1.4"/>
    <circle cx="0" cy="58" r="5.5" fill="#C4693A" opacity="0.7"/>
    <line x1="-14" y1="7" x2="-46" y2="24" stroke="#131929" stroke-width="1.4"/>
    <circle cx="-49" cy="26" r="5" fill="#C4693A" opacity="0.7"/>
    <line x1="-14" y1="-7" x2="-46" y2="-24" stroke="#131929" stroke-width="1.4"/>
    <circle cx="-49" cy="-26" r="5" fill="#C4693A" opacity="0.7"/>
    <!-- Secondary smaller atoms -->
    <circle cx="24" cy="-44" r="3.5" fill="#C4693A" opacity="0.5"/>
    <line x1="0" y1="-58" x2="24" y2="-44" stroke="#131929" stroke-width="0.8"/>
    <circle cx="-24" cy="-44" r="3.5" fill="#C4693A" opacity="0.5"/>
    <line x1="0" y1="-58" x2="-24" y2="-44" stroke="#131929" stroke-width="0.8"/>
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="68" fill="none" stroke="#131929" stroke-width="0.6" stroke-dasharray="4,4" opacity="0.4"/>
  </g>
</svg>
