<svg viewBox="0 0 300 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body-sr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E5E2DB"/>
      <stop offset="35%" stop-color="#F0EDE6"/>
      <stop offset="100%" stop-color="#E2DFD8"/>
    </linearGradient>
    <linearGradient id="cap-sr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D6D2CB"/>
      <stop offset="100%" stop-color="#C5C1BA"/>
    </linearGradient>
    <linearGradient id="ring-sr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A84B"/>
      <stop offset="100%" stop-color="#B0844A"/>
    </linearGradient>
    <clipPath id="cap-clip-sr">
      <rect x="52" y="15" width="196" height="90" rx="22"/>
    </clipPath>
  </defs>

  <!-- BOTTLE BODY -->
  <rect x="45" y="112" width="210" height="340" rx="14" fill="url(#body-sr)"/>

  <!-- NAVY BOTTOM -->
  <path d="M45,380 L255,380 L255,452 Q255,466 241,466 L59,466 Q45,466 45,452 Z" fill="#131929"/>

  <!-- CAP -->
  <rect x="52" y="15" width="196" height="90" rx="22" fill="url(#cap-sr)"/>
  <g clip-path="url(#cap-clip-sr)" opacity="0.45">
    <circle cx="72" cy="30" r="2.2" fill="#3A3730"/>
    <circle cx="145" cy="22" r="1.6" fill="#3A3730"/>
    <circle cx="205" cy="38" r="2.4" fill="#3A3730"/>
    <circle cx="88" cy="62" r="1.8" fill="#3A3730"/>
    <circle cx="168" cy="68" r="2.1" fill="#3A3730"/>
    <circle cx="220" cy="52" r="1.6" fill="#3A3730"/>
    <circle cx="118" cy="82" r="2.3" fill="#3A3730"/>
    <circle cx="65" cy="90" r="1.7" fill="#3A3730"/>
    <circle cx="238" cy="75" r="2" fill="#3A3730"/>
    <circle cx="185" cy="92" r="1.5" fill="#3A3730"/>
    <circle cx="102" cy="45" r="2" fill="#3A3730"/>
    <circle cx="158" cy="50" r="1.9" fill="#3A3730"/>
    <circle cx="228" cy="28" r="2.3" fill="#3A3730"/>
    <circle cx="62" cy="50" r="1.5" fill="#3A3730"/>
    <circle cx="132" cy="38" r="1.8" fill="#3A3730"/>
    <circle cx="192" cy="25" r="2" fill="#3A3730"/>
    <circle cx="78" cy="78" r="2.1" fill="#3A3730"/>
    <circle cx="245" cy="58" r="1.7" fill="#3A3730"/>
  </g>

  <!-- GOLD RING -->
  <rect x="45" y="103" width="210" height="11" rx="3" fill="url(#ring-sr)"/>

  <!-- LABEL CONTENT -->
  <text x="68" y="143" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="400" letter-spacing="5" fill="#131929">NUCLORA</text>
  <text x="68" y="158" font-family="Arial, Helvetica, sans-serif" font-size="6.5" font-weight="400" letter-spacing="3" fill="#5A3E8A">CELLULAR LONGEVITY</text>

  <!-- Product name -->
  <text x="68" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="23" font-weight="400" fill="#131929">SLEEP &amp;</text>
  <text x="68" y="223" font-family="Georgia, 'Times New Roman', serif" font-size="23" font-weight="400" fill="#131929">RECOVERY</text>

  <!-- Dosage -->
  <text x="68" y="247" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="300" fill="#2A2520">Magnesium Glycinate</text>
  <text x="68" y="261" font-family="Arial, Helvetica, sans-serif" font-size="7.5" font-weight="300" fill="#7A756E">With Ashwagandha + L-Theanine</text>

  <!-- Gold separator line -->
  <line x1="68" y1="273" x2="128" y2="273" stroke="#B8906A" stroke-width="1.5"/>

  <!-- Benefits -->
  <text x="68" y="291" font-family="Arial, Helvetica, sans-serif" font-size="6.8" letter-spacing="0.8" fill="#2A2520">DEEP SLEEP SUPPORT*</text>
  <text x="68" y="305" font-family="Arial, Helvetica, sans-serif" font-size="6.8" letter-spacing="0.8" fill="#2A2520">CELLULAR REPAIR* · RECOVERY*</text>

  <!-- Bottle info -->
  <text x="68" y="368" font-family="Arial, Helvetica, sans-serif" font-size="6.5" letter-spacing="1" fill="#2A2520">DIETARY SUPPLEMENT</text>
  <text x="68" y="380" font-family="Arial, Helvetica, sans-serif" font-size="6.5" letter-spacing="1" fill="#2A2520">60 VEGGIE CAPSULES</text>

  <!-- N monogram -->
  <text x="150" y="452" font-family="Georgia, serif" font-size="13" fill="#B8906A" opacity="0.5" text-anchor="middle" letter-spacing="1">N</text>

  <!-- MOLECULAR GRAPHIC — Concentric calm ripple circles -->
  <g transform="translate(210, 265)" opacity="0.16">
    <!-- Concentric ripple rings -->
    <circle cx="0" cy="0" r="65" fill="none" stroke="#131929" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#131929" stroke-width="1"/>
    <circle cx="0" cy="0" r="36" fill="none" stroke="#131929" stroke-width="1"/>
    <circle cx="0" cy="0" r="23" fill="none" stroke="#131929" stroke-width="1"/>
    <circle cx="0" cy="0" r="12" fill="#5A3E8A" opacity="0.5"/>
    <!-- Orbital dots at 4 points -->
    <circle cx="0" cy="-65" r="5" fill="#5A3E8A" opacity="0.7"/>
    <circle cx="65" cy="0" r="4" fill="#5A3E8A" opacity="0.6"/>
    <circle cx="0" cy="65" r="5" fill="#5A3E8A" opacity="0.7"/>
    <circle cx="-65" cy="0" r="4" fill="#5A3E8A" opacity="0.6"/>
    <!-- 45-degree dots -->
    <circle cx="46" cy="-46" r="3.5" fill="#5A3E8A" opacity="0.5"/>
    <circle cx="46" cy="46" r="3.5" fill="#5A3E8A" opacity="0.5"/>
    <circle cx="-46" cy="46" r="3.5" fill="#5A3E8A" opacity="0.5"/>
    <circle cx="-46" cy="-46" r="3.5" fill="#5A3E8A" opacity="0.5"/>
    <!-- Inner orbital dots -->
    <circle cx="0" cy="-36" r="3" fill="#5A3E8A" opacity="0.4"/>
    <circle cx="36" cy="0" r="3" fill="#5A3E8A" opacity="0.4"/>
    <circle cx="0" cy="36" r="3" fill="#5A3E8A" opacity="0.4"/>
    <circle cx="-36" cy="0" r="3" fill="#5A3E8A" opacity="0.4"/>
  </g>
</svg>
